name: Purge CDN

on:
  schedule:
    # Executa a cada 1 hora e 30 minutos (sincronizado: 00:00, 01:30, 03:00, etc.)
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch: # Permite execução manual pela interface do GitHub

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge jsDelivr Cache
        run: |
          echo "Iniciando limpeza do cache jsDelivr para o repositório ambiente_ESP..."
          curl -X GET "https://purge.jsdelivr.net/gh/canalqb/ambiente_ESP@main/index.html"
          curl -X GET "https://purge.jsdelivr.net/gh/canalqb/ambiente_ESP@main/style.css"
          curl -X GET "https://purge.jsdelivr.net/gh/canalqb/ambiente_ESP@main/components.css"
          curl -X GET "https://purge.jsdelivr.net/gh/canalqb/ambiente_ESP@main/secure-config.js"
          curl -X GET "https://purge.jsdelivr.net/gh/canalqb/ambiente_ESP@main/ga4-gtm-integration.js"
          curl -X GET "https://purge.jsdelivr.net/gh/canalqb/ambiente_ESP@main/sites.txt"
          echo "Processo concluído."
